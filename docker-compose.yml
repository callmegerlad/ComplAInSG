name: complainsg

services:
  postgres:
    image: postgres:15-alpine
    container_name: complainsg-db
    environment:
      POSTGRES_USER: complainsg
      POSTGRES_PASSWORD: complainsg
      POSTGRES_DB: complainsg
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U complainsg"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - complainsg-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: complainsg-backend
    environment:
      DATABASE_URL: postgresql://complainsg:complainsg@postgres:5432/complainsg
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/backend/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - complainsg-network
  
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: complainsg-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    networks:
      - complainsg-network

networks:
  complainsg-network:
    driver: bridge

volumes:
  postgres_data:
