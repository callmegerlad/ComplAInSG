name: complainsg

services:
  postgres:
    image: postgres:15-alpine
    container_name: complainsg-db
    environment:
      POSTGRES_USER: complainsg
      POSTGRES_PASSWORD: complainsg
      POSTGRES_DB: complainsg
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U complainsg"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - complainsg-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: complainsg-backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://complainsg:complainsg@postgres:5432/complainsg
      ALLOWED_ORIGINS: '["http://localhost:3000","http://localhost:5173","http://localhost:8000"]'
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - complainsg-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: complainsg-frontend
    ports:
      - "5173:5173"
    environment:
      # BACKEND_URL is used by the Vite proxy (server-side, inside Docker network)
      BACKEND_URL: http://backend:8000
      # VITE_API_URL is intentionally empty so the client uses relative paths
      # through the Vite proxy — the browser never talks to the backend directly
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - complainsg-network

networks:
  complainsg-network:
    driver: bridge

volumes:
  postgres_data:
