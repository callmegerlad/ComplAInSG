name: complainsg

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: complainsg
      POSTGRES_PASSWORD: complainsg
      POSTGRES_DB: complainsg
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U complainsg"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://complainsg:complainsg@postgres:5432/complainsg
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/backend/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
